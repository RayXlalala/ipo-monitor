name: crawl-ipo

on:
  schedule:
    # 每天 UTC 18:00 = 北京时间次日 02:00
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run crawler
        run: npm run crawl

      - name: Commit refreshed data
        run: |
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name "ipo-bot"
            git config user.email "[email protected]"
            git add data/
            git commit -m "chore(data): refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no data changes"
          fi
